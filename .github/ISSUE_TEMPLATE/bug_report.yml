name: Bug report
description: Report a reproducible bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, URLs, browser/device, and sample data shape when possible.
      placeholder: |
        1. Start with...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: What checks did you run?
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, browser, iOS/Xcode version, deployment target.
